<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador de Cliques com HTML e CSS</title>
  <style>
    /* Estilo básico */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }
    /* Estilo para o botão */
    button {
      padding: 10px 20px;
      font-size: 1.5rem;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    .botao:hover {
      background-color: #45a049;
    }
    p{
        font-size: 30px;
        font-weight: bolder;
    }
  </style>
</head>
<body>
    <h1>CONTADOR DE CLIQUE</h1><br>
    <button onclick="clique()">CLIQUE</button>
    <p id="cont">0</p>
    <script>
        function clique(){
            let cont = document.getElementById('cont');
            let soma = parseInt(cont.innerHTML); // Ele transforma o id da variavel cont em número inteiro
            soma+=1; // A cada vez que o usuário clicar no botão será somado mais 1
            cont.innerHTML = soma; // Aqui será a execução do botão
        }
    </script>
</body>
</html>
